name: Train Model

# Обучение запускается вручную (можно задать число примеров/эпох) либо
# автоматически при изменении кода в training/. Обучение и экспорт разбиты
# на отдельные джобы: если экспорт упадёт (например, из-за версии torch),
# можно перезапустить через "Re-run failed jobs" — GitHub переиспользует
# артефакт с уже обученными весами и НЕ будет обучать модель заново.
#
# Дополнительно чекпоинт кэшируется по training/CACHE_VERSION + параметрам
# samples/epochs: если версия и параметры не менялись, шаги генерации
# датасета и обучения пропускаются, веса берутся из кэша. Версию нужно
# увеличивать вручную (training/CACHE_VERSION), когда меняется что-то,
# реально влияющее на результат обучения — архитектура модели, логика
# генерации данных, гиперпараметры. Рефакторинг кода (не меняющий
# поведение) кэш не ломает.
on:
  workflow_dispatch:
    inputs:
      samples:
        description: 'Число синтетических примеров'
        default: '20000'
      epochs:
        description: 'Число эпох обучения'
        default: '15'
  push:
    branches: [main]
    paths:
      - 'training/**'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: training/requirements.txt

      - name: Установка английских шрифтов разных стилей
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu fonts-liberation fonts-liberation2 \
            fonts-noto-core fonts-freefont-ttf

      - name: Сбор шрифтов в training/fonts
        run: |
          mkdir -p training/fonts
          find /usr/share/fonts -iname '*.ttf' -exec cp {} training/fonts/ \;
          echo "Найдено шрифтов: $(ls training/fonts | wc -l)"

      - name: Установка Python-зависимостей
        run: pip install -r training/requirements.txt

      - name: Вычисление ключа кэша обучения
        id: cache-key
        run: |
          VERSION=$(cat training/CACHE_VERSION)
          SAMPLES="${{ github.event.inputs.samples || '20000' }}"
          EPOCHS="${{ github.event.inputs.epochs || '15' }}"
          echo "key=checkpoint-v${VERSION}-s${SAMPLES}-e${EPOCHS}" >> "$GITHUB_OUTPUT"

      - name: Кэш обученных весов
        id: cache-checkpoint
        uses: actions/cache@v4
        with:
          path: training/crnn_ocr.pt
          key: ${{ steps.cache-key.outputs.key }}

      - name: Проверка, не закоммичен ли чекпоинт вручную
        id: checkpoint-in-repo
        run: |
          if [ -f training/crnn_ocr.pt ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Чекпоинт уже есть в репозитории — обучение будет пропущено."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Генерация синтетического датасета
        if: steps.cache-checkpoint.outputs.cache-hit != 'true' && steps.checkpoint-in-repo.outputs.exists != 'true'
        working-directory: training
        run: python generate_dataset.py --n-samples ${{ github.event.inputs.samples || '20000' }}

      - name: Обучение модели
        if: steps.cache-checkpoint.outputs.cache-hit != 'true' && steps.checkpoint-in-repo.outputs.exists != 'true'
        working-directory: training
        run: python train.py --epochs ${{ github.event.inputs.epochs || '15' }}

      - name: Обучение пропущено (кэш или готовый чекпоинт в репозитории)
        if: steps.cache-checkpoint.outputs.cache-hit == 'true' || steps.checkpoint-in-repo.outputs.exists == 'true'
        run: 'echo "Обучение пропущено: чекпоинт уже доступен (кэш или файл в репозитории)."'

      - name: Публикация чекпоинта как артефакта (для джобы export)
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint
          path: training/crnn_ocr.pt

  export:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей для экспорта (только torch + onnx)
        run: pip install torch onnx --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Скачать обученный чекпоинт
        uses: actions/download-artifact@v4
        with:
          name: checkpoint
          path: training

      - name: Создать rust/assets (пустые папки не хранятся в git)
        run: mkdir -p rust/assets

      - name: Экспорт в ONNX
        working-directory: training
        run: python export_onnx.py

      - name: Публикация model.onnx как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: rust/assets/model.onnx

      - name: Коммит обученной модели в репозиторий
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(model): обновление обученной ONNX-модели"
          file_pattern: rust/assets/model.onnx
          commit_user_name: "webocr-bot"
          commit_user_email: "actions@github.com"

      # Коммит модели (файл вне training/) автоматически запустит
      # workflow build.yml, который соберёт свежий .wasm-пакет.
